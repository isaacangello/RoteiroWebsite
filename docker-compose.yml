services:
  wordpress:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roteiro-wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-secret}
      WORDPRESS_DB_NAME: ${DB_NAME:-roteiro_website}
      WORDPRESS_TABLE_PREFIX: rw_
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('WP_ENVIRONMENT_TYPE', 'development');
        define('WP_HOME', 'http://localhost:8080');
        define('WP_SITEURL', 'http://localhost:8080');
    volumes:
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wp-content/uploads:/var/www/html/wp-content/uploads
      - ./wp-content/languages:/var/www/html/wp-content/languages
    depends_on:
      db:
        condition: service_healthy
    networks:
      - roteiro-network

  db:
    image: mariadb:11
    container_name: roteiro-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-roteiro_website}
      MYSQL_USER: ${DB_USER:-wordpress}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - roteiro-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: roteiro-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 128M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - roteiro-network

volumes:
  db_data:

networks:
  roteiro-network:
    driver: bridge
